<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>

    <style>
      /* パイプラインの光の進行 */
      .progress-line {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: progressLine 10s infinite ease-in-out;
      }
      @keyframes progressLine {
        0%, 10% { stroke-dashoffset: 100; opacity: 1; }
        15% { stroke-dashoffset: 83.3; opacity: 1; }  /* Phase 1到達 */
        30% { stroke-dashoffset: 61.6; opacity: 1; }  /* Phase 2到達 */
        45% { stroke-dashoffset: 40.0; opacity: 1; }  /* Phase 3到達 */
        70% { stroke-dashoffset: 18.3; opacity: 1; }  /* Phase 4到達 */
        85%, 90% { stroke-dashoffset: 0; opacity: 1; } /* Output到達 */
        95%, 100% { stroke-dashoffset: 0; opacity: 0; }
      }

      /* 入力ソースから流れるデータ */
      .source-flow {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: sourceFlow 10s infinite ease-in-out;
      }
      @keyframes sourceFlow {
        0%, 5% { stroke-dashoffset: 100; opacity: 1; }
        15%, 90% { stroke-dashoffset: 0; opacity: 1; }
        95%, 100% { stroke-dashoffset: 0; opacity: 0; }
      }

      /* 各フェーズノードのパルス発光（到達タイミングに同期） */
      .p1 .node-bg { animation: pulseP1 10s infinite; transform-origin: 350px 250px; }
      @keyframes pulseP1 {
        14%, 31% { fill: #1f6feb; stroke: #58a6ff; filter: drop-shadow(0 0 12px rgba(88,166,255,0.8)); transform: scale(1.05); }
        0%, 13%, 32%, 100% { fill: #21262d; stroke: #30363d; filter: none; transform: scale(1); }
      }

      .p2 .node-bg { animation: pulseP2 10s infinite; transform-origin: 480px 250px; }
      @keyframes pulseP2 {
        29%, 46% { fill: #238636; stroke: #3fb950; filter: drop-shadow(0 0 12px rgba(63,185,80,0.8)); transform: scale(1.05); }
        0%, 28%, 47%, 100% { fill: #21262d; stroke: #30363d; filter: none; transform: scale(1); }
      }

      .p3 .node-bg { animation: pulseP3 10s infinite; transform-origin: 610px 250px; }
      @keyframes pulseP3 {
        44%, 71% { fill: #6e40c9; stroke: #d2a8ff; filter: drop-shadow(0 0 12px rgba(210,168,255,0.8)); transform: scale(1.05); }
        0%, 43%, 72%, 100% { fill: #21262d; stroke: #30363d; filter: none; transform: scale(1); }
      }

      .p4 .node-bg { animation: pulseP4 10s infinite; transform-origin: 740px 250px; }
      @keyframes pulseP4 {
        69%, 86% { fill: #9e6a03; stroke: #d29922; filter: drop-shadow(0 0 12px rgba(210,153,34,0.8)); transform: scale(1.05); }
        0%, 68%, 87%, 100% { fill: #21262d; stroke: #30363d; filter: none; transform: scale(1); }
      }

      /* 最終出力の浮遊と発光 */
      .output-docs { animation: outputGlow 10s infinite; transform-origin: 925px 250px; }
      @keyframes outputGlow {
        84%, 95% { transform: translateY(-8px); }
        0%, 83%, 96%, 100% { transform: translateY(0); }
      }
      .output-docs .front-doc-bg { animation: docFillGlow 10s infinite; }
      .output-docs .front-doc-line { animation: docStrokeGlow 10s infinite; }
      @keyframes docFillGlow {
        84%, 95% { stroke: #58a6ff; filter: drop-shadow(0 0 15px rgba(88,166,255,0.6)); }
        0%, 83%, 96%, 100% { stroke: #8b949e; filter: none; }
      }
      @keyframes docStrokeGlow {
        84%, 95% { stroke: #58a6ff; }
        0%, 83%, 96%, 100% { stroke: #8b949e; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#0d1117"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <path d="M 94 100 C 180 100, 180 250, 250 250" fill="none" stroke="#30363d" stroke-width="3"/>
  <path d="M 94 175 C 180 175, 180 250, 250 250" fill="none" stroke="#30363d" stroke-width="3"/>
  <path d="M 94 250 L 250 250" fill="none" stroke="#30363d" stroke-width="3"/>
  <path d="M 94 325 C 180 325, 180 250, 250 250" fill="none" stroke="#30363d" stroke-width="3"/>
  <path d="M 94 400 C 180 400, 180 250, 250 250" fill="none" stroke="#30363d" stroke-width="3"/>

  <line x1="250" y1="250" x2="850" y2="250" stroke="#30363d" stroke-width="8" stroke-linecap="round"/>

  <path d="M 94 100 C 180 100, 180 250, 250 250" fill="none" stroke="#58a6ff" stroke-width="4" pathLength="100" class="source-flow" stroke-linecap="round"/>
  <path d="M 94 175 C 180 175, 180 250, 250 250" fill="none" stroke="#58a6ff" stroke-width="4" pathLength="100" class="source-flow" stroke-linecap="round"/>
  <path d="M 94 250 L 250 250" fill="none" stroke="#58a6ff" stroke-width="4" pathLength="100" class="source-flow" stroke-linecap="round"/>
  <path d="M 94 325 C 180 325, 180 250, 250 250" fill="none" stroke="#58a6ff" stroke-width="4" pathLength="100" class="source-flow" stroke-linecap="round"/>
  <path d="M 94 400 C 180 400, 180 250, 250 250" fill="none" stroke="#58a6ff" stroke-width="4" pathLength="100" class="source-flow" stroke-linecap="round"/>
  
  <line x1="250" y1="250" x2="850" y2="250" stroke="#58a6ff" stroke-width="8" pathLength="100" class="progress-line" stroke-linecap="round"/>

  <rect x="330" y="80" width="420" height="34" rx="17" fill="#1f6feb" opacity="0.15"/>
  <text x="540" y="103" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold" letter-spacing="1">一度頼めば、収集から提案まで自律完走</text>
  
  <text x="540" y="145" text-anchor="middle" fill="#c9d1d9" font-size="24" font-weight="bold">daytrace-session</text>
  <text x="540" y="168" text-anchor="middle" fill="#8b949e" font-size="14" font-weight="bold">0〜1回確認 / fail-soft / local-only</text>

  <path d="M 320 185 L 320 175 L 770 175 L 770 185" fill="none" stroke="#484f58" stroke-width="2"/>

  <g class="source">
    <circle cx="70" cy="100" r="24" fill="#21262d" stroke="#30363d" stroke-width="2"/>
    <text x="70" y="104" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">Git</text>
  </g>
  <g class="source">
    <circle cx="70" cy="175" r="24" fill="#21262d" stroke="#30363d" stroke-width="2"/>
    <text x="70" y="179" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">Claude</text>
  </g>
  <g class="source">
    <circle cx="70" cy="250" r="24" fill="#21262d" stroke="#30363d" stroke-width="2"/>
    <text x="70" y="254" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">Codex</text>
  </g>
  <g class="source">
    <circle cx="70" cy="325" r="24" fill="#21262d" stroke="#30363d" stroke-width="2"/>
    <text x="70" y="329" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">Chrome</text>
  </g>
  <g class="source">
    <circle cx="70" cy="400" r="24" fill="#21262d" stroke="#30363d" stroke-width="2"/>
    <text x="70" y="396" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="bold">File</text>
    <text x="70" y="411" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="bold">Activity</text>
  </g>

  <g class="node p1">
    <circle cx="350" cy="250" r="35" class="node-bg" />
    <text x="350" y="246" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">Phase 1</text>
    <text x="350" y="264" text-anchor="middle" fill="#8b949e" font-size="14">Collect</text>
    <text x="350" y="310" text-anchor="middle" fill="#8b949e" font-size="14" font-weight="bold">aggregate.py</text>
    <rect x="300" y="320" width="100" height="24" rx="12" fill="#21262d" stroke="#58a6ff" stroke-width="1"/>
    <text x="350" y="336" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">5 local logs</text>
  </g>

  <g class="node p2">
    <circle cx="480" cy="250" r="35" class="node-bg" />
    <text x="480" y="246" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">Phase 2</text>
    <text x="480" y="264" text-anchor="middle" fill="#8b949e" font-size="14">Report</text>
    <text x="480" y="310" text-anchor="middle" fill="#8b949e" font-size="14" font-weight="bold">daily-report</text>
    <rect x="430" y="320" width="100" height="24" rx="12" fill="#21262d" stroke="#3fb950" stroke-width="1"/>
    <text x="480" y="336" text-anchor="middle" fill="#3fb950" font-size="12">Date-first</text>
  </g>

  <g class="node p3">
    <circle cx="610" cy="250" r="35" class="node-bg" />
    <text x="610" y="246" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">Phase 3</text>
    <text x="610" y="264" text-anchor="middle" fill="#8b949e" font-size="14">Mining</text>
    <text x="610" y="310" text-anchor="middle" fill="#8b949e" font-size="14" font-weight="bold">skill-miner</text>
    <rect x="560" y="320" width="100" height="24" rx="12" fill="#21262d" stroke="#d2a8ff" stroke-width="1"/>
    <text x="610" y="336" text-anchor="middle" fill="#d2a8ff" font-size="12">Scope-first</text>
  </g>

  <g class="node p4">
    <circle cx="740" cy="250" r="35" class="node-bg" />
    <text x="740" y="246" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">Phase 4</text>
    <text x="740" y="264" text-anchor="middle" fill="#8b949e" font-size="14">Draft</text>
    <text x="740" y="310" text-anchor="middle" fill="#8b949e" font-size="14" font-weight="bold">post-draft</text>
    <rect x="690" y="320" width="100" height="24" rx="12" fill="#21262d" stroke="#d29922" stroke-width="1"/>
    <text x="740" y="336" text-anchor="middle" fill="#d29922" font-size="12">Date-first</text>
  </g>

  <rect x="460" y="365" width="300" height="30" rx="15" fill="#21262d" stroke="#484f58" stroke-width="1"/>
  <text x="610" y="385" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="bold">✓ evidence付き / confidence付き</text>

  <g class="output-docs">
    <rect x="880" y="195" width="60" height="80" rx="4" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <line x1="890" y1="215" x2="930" y2="215" stroke="#30363d" stroke-width="2"/>
    <line x1="890" y1="225" x2="920" y2="225" stroke="#30363d" stroke-width="2"/>
    
    <rect x="895" y="210" width="60" height="80" rx="4" fill="#161b22" stroke="#484f58" stroke-width="2"/>
    <line x1="905" y1="230" x2="945" y2="230" stroke="#484f58" stroke-width="2"/>
    <line x1="905" y1="240" x2="935" y2="240" stroke="#484f58" stroke-width="2"/>
    
    <rect x="910" y="225" width="60" height="80" rx="4" fill="#0d1117" class="front-doc-bg" stroke-width="2"/>
    <line x1="920" y1="245" x2="960" y2="245" class="front-doc-line" stroke-width="2"/>
    <line x1="920" y1="255" x2="950" y2="255" class="front-doc-line" stroke-width="2"/>
    <line x1="920" y1="265" x2="960" y2="265" class="front-doc-line" stroke-width="2"/>
    
    <text x="925" y="335" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="bold">Outputs</text>
    <text x="925" y="355" text-anchor="middle" fill="#8b949e" font-size="12">日報 / 記事 / スキル提案</text>
    
    <rect x="860" y="365" width="130" height="24" rx="12" fill="#238636" opacity="0.2"/>
    <text x="925" y="381" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">人が読む用に整形</text>
  </g>

  <text x="500" y="470" text-anchor="middle" fill="#8b949e" font-size="13">※ 取得できないログは自動スキップ（Graceful Degrade）</text>
</svg>
